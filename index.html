<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="home.css" />
    <link rel="stylesheet" href="extra-styles/blooms.css" />

    <title>neb's site - home</title>

    <script>
      const stored = localStorage.getItem("theme");
      if (stored) document.documentElement.style.colorScheme = stored;
    </script>
  </head>
  <body class="bloomy-background">
    <nav class="glass">
      <a class="glass" href="/">Home</a>
      <a class="glass" href="/projects/">Projects</a>
      <a class="glass" href="">Tools</a>
      <a class="glass" href="">Games</a>
      <a class="glass" href="">About</a>

      <a id="theme-toggle" class="glass" role="button" aria-label="Toggle theme">
        <img src="images/sun.svg" alt="" />
      </a>
    </nav>

    <main class="hero">
      <div class="spacer"></div>

      <h1 id="home-text"></h1>

      <div class="button-wrapper">
        <a class="btn glass" href="#featured-project">check it out</a>
      </div>
    </main>

    <section class="content-below" id="featured-project">
      <div class="project-card">
        <p class="label">featured project</p>
        <h2 class="project-title">btd5-restored</h2>

        <div class="image-frame">
          <img src="images/btd5-restored-gameplay.webp" alt="btd5-restored gameplay" />
        </div>

        <a href="" class="view-project">More about btd5-restored →</a>
      </div>
    </section>

    <footer>
      <a class="btn-dark glass" href="#">back to top</a>
      <p>© 2026 nebulimity. All Rights Reserved.</p>
    </footer>
  </body>

  <script src="scripts/randomText.js"></script>
  <script src="scripts/generateBlooms.js"></script>
  <script src="scripts/toggleTheme.js"></script>
</html>
